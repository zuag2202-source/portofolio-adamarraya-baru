  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // --- GHOST CURSOR COMPONENT (DYNAMIC IMPORT SUPPORTED) ---
    const GhostCursor = ({
      className,
      style,
      trailLength = 50,
      inertia = 0.5,
      grainIntensity = 0.05,
      bloomStrength = 0.1,
      bloomRadius = 1.0,
      bloomThreshold = 0.025,
      brightness = 1,
      color = '#dcae6c', // Default Gold
      mixBlendMode = 'screen',
      edgeIntensity = 0,
      maxDevicePixelRatio = 0.5,
      targetPixels,
      fadeDelayMs,
      fadeDurationMs,
      zIndex = 10
    }) => {
      const containerRef = useRef(null);
      const activePropsRef = useRef({ color, brightness, edgeIntensity, grainIntensity });

      // Sinkronisasi Prop dinamis ke loop WebGL tanpa re-render effect
      useEffect(() => {
        activePropsRef.current = { color, brightness, edgeIntensity, grainIntensity };
      }, [color, brightness, edgeIntensity, grainIntensity]);

      useEffect(() => {
        const host = containerRef.current;
        if (!host) return;

        let active = true;
        let running = false;
        let rafId = null;
        let resizeObs = null;
        let pointerActive = false;
        let lastMoveTime = Date.now();
        let fadeOpacity = 1.0;
        let hasValidSize = false;

        // Variables that will hold WebGL objects
        let scene, camera, renderer, composer, material, geom, bloomPass, filmPass;
        let trailBuf = [];
        let head = 0;
        let currentMouse = { x: 0.5, y: 0.5 };
        let velocity = { x: 0, y: 0 };

        try {
          if (!active) return;
          if (!window.THREE) {
            console.error("Three.js belum dimuat dengan benar.");
            return;
          }

          const isTouch = typeof window !== 'undefined' && ('ontouchstart' in window || navigator.maxTouchPoints > 0);
          const budget = targetPixels ?? (isTouch ? 0.9e6 : 1.3e6);
          const fDelay = fadeDelayMs ?? (isTouch ? 500 : 1000);
          const fDuration = fadeDurationMs ?? (isTouch ? 1000 : 1500);

          // Shaders
          const baseVertexShader = `
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = vec4(position, 1.0);
            }
          `;
          const fragmentShader = `
            uniform float iTime;
            uniform vec3  iResolution;
            uniform vec2  iMouse;
            uniform vec2  iPrevMouse[MAX_TRAIL_LENGTH];
            uniform float iOpacity;
            uniform float iScale;
            uniform vec3  iBaseColor;
            uniform float iBrightness;
            uniform float iEdgeIntensity;
            varying vec2  vUv;

            float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7))) * 43758.5453123); }
            float noise(vec2 p){
              vec2 i = floor(p), f = fract(p);
              f *= f * (3. - 2. * f);
              return mix(mix(hash(i + vec2(0.,0.)), hash(i + vec2(1.,0.)), f.x),
                         mix(hash(i + vec2(0.,1.)), hash(i + vec2(1.,1.)), f.x), f.y);
            }
            float fbm(vec2 p){
              float v = 0.0;
              float a = 0.5;
              mat2 m = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
              for(int i=0;i<5;i++){
                v += a * noise(p);
                p = m * p * 2.0;
                a *= 0.5;
              }
              return v;
            }
            vec3 tint1(vec3 base){ return mix(base, vec3(1.0), 0.15); }
            vec3 tint2(vec3 base){ return mix(base, vec3(0.8, 0.9, 1.0), 0.25); }

            vec4 blob(vec2 p, vec2 mousePos, float intensity, float activity) {
              vec2 q = vec2(fbm(p * iScale + iTime * 0.1), fbm(p * iScale + vec2(5.2,1.3) + iTime * 0.1));
              vec2 r = vec2(fbm(p * iScale + q * 1.5 + iTime * 0.15), fbm(p * iScale + q * 1.5 + vec2(8.3,2.8) + iTime * 0.15));

              float smoke = fbm(p * iScale + r * 0.8);
              float radius = 0.5 + 0.3 * (1.0 / iScale);
              float distFactor = 1.0 - smoothstep(0.0, radius * activity, length(p - mousePos));
              float alpha = pow(smoke, 2.5) * distFactor;

              vec3 c1 = tint1(iBaseColor);
              vec3 c2 = tint2(iBaseColor);
              vec3 color = mix(c1, c2, sin(iTime * 0.5) * 0.5 + 0.5);

              return vec4(color * alpha * intensity, alpha * intensity);

      }, [currentText, isDeleting, currentWordIndex, words, typingSpeed]);

      return <span className="inline-block min-h-[1.5em] text-gold-900 font-syne tracking-wide">{currentText}<span className="animate-pulse font-light ml-1">|</span></span>;

    function PythonSimulation() {
      const [logs, setLogs] = useState(['[INFO] Socket server initialized on port 8080...', '[INFO] Listening for incoming TCP links...']);
      const [requestsCount, setRequestsCount] = useState(0);

      const triggerRequest = () => {
        const routes = ['/', '/api/status', '/index.html', '/unauthorized', '/assets/logo.png'];
        const selectedRoute = routes[Math.floor(Math.random() * routes.length)];
        const statuses = [200, 200, 404, 401, 304]; const status = statuses[routes.indexOf(selectedRoute)];
        const timestamp = new Date().toLocaleTimeString();
        const requestLog = `[REQ] ${timestamp} - 127.0.0.1 - GET ${selectedRoute} HTTP/1.1`;
        const responseLog = `[RESP] ${timestamp} - Server responds: ${status} ${status === 200 ? 'OK' : status === 404 ? 'NOT FOUND' : 'ACTION COMPLETED'}`;
        
        setLogs(prev => [...prev.slice(-4), requestLog, responseLog]); setRequestsCount(c => c + 1);
      };

      return (
        <div className="bg-black/80 rounded-lg p-4 font-mono text-xs text-green-400 border border-burgundy-800/60 shadow-inner">
